# For deployment on the production RHEL VM (linux/amd64).
# The pre-built GHCR images are arm64-only and cannot be pulled on an amd64 host.
# Images are built locally from the root Dockerfile — no pull from GHCR for web/worker.
# All configuration comes from .env.production (gitignored, see .env.production.example).

x-app: &app
  env_file:
    - .env.production
  build:
    context: .
    target: hyku-web
    cache_from:
      - ghcr.io/wvulibraries/wvu_knapsack/web:latest
    args:
      BUILDKIT_INLINE_CACHE: 1
      APP_PATH: ./hyrax-webapp
  pull_policy: build
  environment:
    - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
    - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
    - BUNDLE_BUNDLER_INJECT__GEM_PATH=/app/samvera/bundler.d
  volumes:
    - ./data/bundle:/usr/local/bundle:cached
    - ./data/node_modules:/app/samvera/hyrax-webapp/node_modules:cached
    - ./data/uploads:/app/samvera/hyrax-webapp/public/uploads:cached
    - ./data/assets:/app/samvera/hyrax-webapp/public/assets:cached
    - ./data/cache:/app/samvera/hyrax-webapp/tmp/cache:cached
    - ./data/logs/rails:/app/samvera/hyrax-webapp/log:cached
    - ./data/ingest:/app/samvera/ingest:cached
    - .:/app/samvera
  networks:
    - internal

networks:
  internal:
    driver: bridge

services:

  zoo:
    image: zookeeper:3.6.2
    restart: on-failure
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zoo:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=mntr,srvr,ruok,conf
    volumes:
      - ./data/zoo:/data
      - ./data/zk:/datalog
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "echo 'ruok' | nc -w 2 -q 2 localhost 2181 | grep imok || exit 1"]
      interval: "10s"
      timeout: "8s"

  solr:
    container_name: solr
    image: ghcr.io/wvulibraries/wvu_knapsack/solr:${TAG:-latest}
    restart: on-failure
    platform: linux/amd64
    env_file:
      - .env.solr
    user: root
    command: bash -c "sh /scripts/startup.sh"
    ports:
      - "8983:8983"
    volumes:
      - ./data/solr:/var/solr/data
      - ./data/logs/solr:/var/solr/logs
      - ./solr-setup:/solr-setup
      - ./startup-solr.sh:/scripts/startup.sh
    healthcheck:
#      test: "curl -sf http://$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASSWORD@localhost:8983/solr/admin/collections?action=LIST"
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/ || exit 1"]
      start_period: 300s
      interval: 10s
      timeout: 10s
      retries: 30
    depends_on:
      zoo:
        condition: service_healthy
    networks:
      - internal

  fcrepo:
    image: ghcr.io/samvera/fcrepo4:4.7.5
    restart: on-failure
    env_file:
      - .env.fedora
    expose:
      - 8080
    volumes:
      - ./data/fcrepo:/data
    networks:
      - internal

  db:
    image: postgres:11.1
    restart: on-failure
    env_file:
      - .env.db
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:5
    restart: on-failure
    env_file:
      - .env.redis
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -h localhost -p 6379 -a $$REDIS_PASSWORD ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - internal

  fits:
    image: ghcr.io/samvera/fitsservlet:1.6.0
    restart: on-failure
    expose:
      - 8080
    networks:
      - internal

  initialize_app:
    <<: *app
    entrypoint: ["sh", "-c"]
    command:
      - >
        rm -f /app/samvera/hyrax-webapp/config/initializers/disable_solr.rb &&
        solrcloud-upload-configset.sh /app/samvera/hyrax-webapp/solr/conf &&
        SOLR_COLLECTION_NAME=hydra-production solrcloud-assign-configset.sh &&
        bundle install &&
        RAILS_ENV=production bundle exec rails assets:precompile &&
        db-migrate-seed.sh
    depends_on:
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy

  worker:
    <<: *app
    build:
      context: .
      target: hyku-worker
      args:
        APP_PATH: ./hyrax-webapp
    image: ghcr.io/wvulibraries/wvu_knapsack/worker:${TAG:-latest}
    entrypoint: ["sh", "-c"]
    command:
      - bundle check || bundle install && ./bin/worker
    depends_on:
      initialize_app:
        condition: service_completed_successfully
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      fits:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy
      # Volumes inherited from x-app anchor for consistency

  web:
    <<: *app
    image: ghcr.io/wvulibraries/wvu_knapsack/web:${TAG:-latest}
    entrypoint: ["sh", "-c"]
    command:
      - bundle check || bundle install && ./bin/web
    ports:
      - "3000:3000"
    environment:
      - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
      - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
      - VIRTUAL_PORT=3000
    depends_on:
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      fits:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy
      worker:
        condition: service_started
      initialize_app:
        condition: service_completed_successfully
